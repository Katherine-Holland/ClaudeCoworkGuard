<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoworkGuard</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #21262d;
    --accent: #00e5ff; --danger: #ff3d3d; --warn: #ff9800;
    --success: #00e676; --muted: #6e7681; --text: #c9d1d9;
    --heading: #e6edf3; --font-mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px; min-height: 200px;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), #0077ff);
    border-radius: 6px; display: flex; align-items: center;
    justify-content: center; font-size: 14px;
  }
  .logo-name { font-weight: 700; font-size: 14px; color: var(--heading); }
  .logo-name span { color: var(--accent); }

  /* Status pill */
  .pill {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 100px;
    font-size: 10px; font-family: var(--font-mono);
    font-weight: 700; letter-spacing: .05em; border: 1px solid;
  }
  .pill.active   { background: rgba(255,61,61,.1);  border-color: var(--danger);  color: var(--danger); }
  .pill.inactive { background: rgba(0,230,118,.08); border-color: var(--success); color: var(--success); }
  .pill.unknown  { background: rgba(110,118,129,.1); border-color: var(--muted);  color: var(--muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  /* Stats row */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border); border-bottom: 1px solid var(--border);
  }
  .stat {
    background: var(--bg); padding: 10px 8px; text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
  .stat-val.blocked { color: var(--danger); }
  .stat-val.flagged { color: var(--warn); }
  .stat-val.clean   { color: var(--success); }
  .stat-lbl { font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }

  /* Recent events */
  .section-title {
    padding: 8px 14px 4px; font-size: 10px; font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
  }
  .event-list { max-height: 140px; overflow-y: auto; }
  .event-list::-webkit-scrollbar { width: 3px; }
  .event-list::-webkit-scrollbar-thumb { background: var(--border); }
  .event-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-bottom: 1px solid rgba(33,38,45,.6);
    font-size: 11px; font-family: var(--font-mono);
  }
  .badge {
    padding: 1px 6px; border-radius: 3px; font-size: 9px;
    font-weight: 700; letter-spacing: .05em; white-space: nowrap;
  }
  .badge.BLOCKED { background: rgba(255,61,61,.15); color: var(--danger); border: 1px solid rgba(255,61,61,.3); }
  .badge.FLAGGED { background: rgba(255,152,0,.12); color: var(--warn);   border: 1px solid rgba(255,152,0,.3); }
  .badge.CLEAN   { background: rgba(0,230,118,.08); color: var(--success); border: 1px solid rgba(0,230,118,.2); }
  .badge.WARNING { background: rgba(0,229,255,.08); color: var(--accent);  border: 1px solid rgba(0,229,255,.2); }
  .event-detail { color: var(--muted); font-size: 10px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty { padding: 20px 14px; text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 11px; }

  /* Footer */
  .footer {
    display: flex; gap: 8px; padding: 10px 14px;
    border-top: 1px solid var(--border); background: var(--card);
  }
  .footer-btn {
    flex: 1; padding: 6px; border-radius: 5px; font-size: 11px;
    font-family: var(--font-mono); cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all .2s; text-align: center;
  }
  .footer-btn:hover { border-color: var(--accent); color: var(--accent); }
  .footer-btn.primary { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,.06); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <div class="logo-name">Cowork<span>Guard</span></div>
  </div>
  <div class="pill unknown" id="status-pill">
    <div class="dot"></div>
    <span id="status-text">CHECKING</span>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-val blocked" id="s-blocked">–</div>
    <div class="stat-lbl">Blocked</div>
  </div>
  <div class="stat">
    <div class="stat-val flagged" id="s-flagged">–</div>
    <div class="stat-lbl">Flagged</div>
  </div>
  <div class="stat">
    <div class="stat-val clean" id="s-clean">–</div>
    <div class="stat-lbl">Clean</div>
  </div>
</div>

<div class="section-title">Recent Events</div>
<div class="event-list" id="event-list">
  <div class="empty">No events yet</div>
</div>

<div class="footer">
  <button class="footer-btn primary" onclick="openDashboard()">Open Dashboard</button>
  <button class="footer-btn" onclick="clearData()">Clear</button>
</div>

<script>
function openDashboard() {
  chrome.tabs.create({ url: 'http://localhost:7070' });
  window.close();
}

async function clearData() {
  await chrome.runtime.sendMessage({ type: 'CLEAR_LOG' });
  document.getElementById('s-blocked').textContent = '0';
  document.getElementById('s-flagged').textContent = '0';
  document.getElementById('s-clean').textContent = '0';
  document.getElementById('event-list').innerHTML = '<div class="empty">Cleared</div>';
}

async function load() {
  // Status
  chrome.runtime.sendMessage({ type: 'GET_STATUS' }, resp => {
    if (!resp) return;
    const pill = document.getElementById('status-pill');
    const text = document.getElementById('status-text');
    if (resp.coworkActive) {
      pill.className = 'pill active';
      text.textContent = 'COWORK ACTIVE';
    } else {
      pill.className = 'pill inactive';
      text.textContent = 'COWORK INACTIVE';
    }
    const s = resp.sessionStats || {};
    document.getElementById('s-blocked').textContent = s.blocked ?? '0';
    document.getElementById('s-flagged').textContent = s.flagged ?? '0';
    document.getElementById('s-clean').textContent   = s.clean   ?? '0';
  });

  // Recent events
  chrome.storage.local.get(['auditLog'], result => {
    const log = result.auditLog || [];
    const list = document.getElementById('event-list');
    if (!log.length) {
      list.innerHTML = '<div class="empty">No events yet</div>';
      return;
    }
    list.innerHTML = log.slice(0, 8).map(e => {
      const action = e.action || 'UNKNOWN';
      const ts = new Date(e.timestamp).toLocaleTimeString('en-US', {hour12:false,hour:'2-digit',minute:'2-digit'});
      const detail = e.type === 'DOMAIN_WARNING'
        ? `Domain: ${e.domain || '–'}`
        : (e.findings?.length ? e.findings.map(f=>f.type).join(', ') : 'Clean');
      return `<div class="event-item">
        <span class="badge ${action}">${action}</span>
        <span class="event-detail">${detail}</span>
        <span style="color:var(--muted);font-size:10px;white-space:nowrap">${ts}</span>
      </div>`;
    }).join('');
  });
}

load();
</script>
</body>
</html>
