<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CoworkGuard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#07090d;--card:#0e1318;--border:#1c2a38;--border2:#243040;
  --accent:#e05a20;--accent2:#f07040;
  --danger:#f05060;--warn:#f0a030;--success:#3dd68c;
  --muted:#4e6278;--muted2:#687d90;--text:#b8c8d8;--heading:#e8f0f8;
  --mono:'DM Mono',monospace;--ui:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{width:300px;min-height:200px;background:var(--bg);color:var(--text);font-family:var(--ui);font-size:13px;-webkit-font-smoothing:antialiased}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card)}
.logo{display:flex;align-items:center;gap:9px}
.logo img{width:26px;height:26px;filter:drop-shadow(0 0 6px rgba(224,90,32,.4))}
.logo-name{font-size:14px;font-weight:600;color:var(--heading);letter-spacing:-.2px}
.logo-name em{font-style:normal;color:var(--accent2)}

/* Status pill — three states */
.pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:10px;font-family:var(--mono);font-weight:500;border:1px solid}
.pill.full    {background:rgba(224,90,32,.1); border-color:var(--accent); color:var(--accent2)}
.pill.partial {background:rgba(240,160,48,.08);border-color:var(--warn);  color:var(--warn)}
.pill.inactive{background:rgba(61,214,140,.07);border-color:var(--success);color:var(--success)}
.pill.unknown {background:rgba(78,98,120,.1);  border-color:var(--muted); color:var(--muted)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Partial protection warning */
.partial-banner{
  background:rgba(240,160,48,.08);border-bottom:1px solid rgba(240,160,48,.2);
  padding:10px 14px;font-size:11px;font-family:var(--mono);color:var(--warn);
  display:none;line-height:1.5;
}
.partial-banner a{color:var(--accent2);text-decoration:none;cursor:pointer}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--bg);padding:10px 8px;text-align:center}
.stat-v{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.stat-v.blocked{color:#f05060}.stat-v.flagged{color:#f0a030}.stat-v.clean{color:#3dd68c}
.stat-l{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}

/* Events */
.section-title{padding:8px 14px 4px;font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.event-list{max-height:140px;overflow-y:auto}
.event-list::-webkit-scrollbar{width:3px}
.event-list::-webkit-scrollbar-thumb{background:var(--border)}
.event-item{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid rgba(28,42,56,.6);font-size:11px;font-family:var(--mono)}
.badge{padding:1px 6px;border-radius:3px;font-size:9px;font-weight:500;letter-spacing:.04em;white-space:nowrap}
.badge.BLOCKED{background:rgba(240,80,96,.12);color:#f05060;border:1px solid rgba(240,80,96,.25)}
.badge.FLAGGED{background:rgba(240,160,48,.1);color:#f0c060;border:1px solid rgba(240,160,48,.22)}
.badge.CLEAN  {background:rgba(61,214,140,.07);color:#3dd68c;border:1px solid rgba(61,214,140,.2)}
.badge.WARNING{background:rgba(224,90,32,.1);color:var(--accent2);border:1px solid rgba(224,90,32,.25)}
.event-detail{color:var(--muted2);font-size:10px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{padding:20px 14px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px}

/* Footer */
.footer{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--card)}
.footer-btn{flex:1;padding:7px;border-radius:6px;font-size:11px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted2);transition:all .2s;text-align:center;font-weight:400}
.footer-btn:hover{border-color:var(--accent);color:var(--accent)}
.footer-btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(224,90,32,.07)}
.footer-btn.primary:hover{background:rgba(224,90,32,.14)}
</style>
</head>

    <div class="dot"></div>

</div>

<!-- Shown when Claude session detected but proxy not running -->
<div class="partial-banner" id="partial-banner">
  <div style="margin-bottom:6px">Payload scanning is off.</div>
  <a href="https://github.com/Katherine-Holland/ClaudeCoworkGuard/releases/download/v1.0.0/CoworkGuard_1.0.0_aarch64.dmg" style="display:inline-flex;align-items:center;gap:6px;background:#e05a20;color:white;text-decoration:none;font-size:10px;font-weight:500;padding:6px 12px;border-radius:5px;margin-top:2px">
    ⬇ Finish Installation
  </a>
</div>

<div class="stats">
  <div class="stat"><div class="stat-v blocked" id="s-blocked">–</div><div class="stat-l">Blocked</div></div>
  <div class="stat"><div class="stat-v flagged" id="s-flagged">–</div><div class="stat-l">Flagged</div></div>
  <div class="stat"><div class="stat-v clean"   id="s-clean">–</div><div class="stat-l">Clean</div></div>
</div>

<!-- Skill scanner alert — shown when skill findings exist -->
<div id="skill-alert" style="display:none;background:rgba(240,80,96,.07);border-bottom:1px solid rgba(240,80,96,.18);padding:8px 14px;font-size:10px;font-family:var(--mono)">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <span style="color:#f08090;font-weight:500" id="skill-alert-text">Skill scanner findings</span>
    <span style="color:var(--muted);cursor:pointer" onclick="showSkillsTab()">View →</span>
  </div>
</div>

<div class="section-title" style="display:flex;align-items:center;justify-content:space-between;padding-right:14px">
  <span>Recent Events</span>
  <span id="tab-toggle" style="font-size:9px;color:var(--accent2);cursor:pointer;letter-spacing:.06em" onclick="toggleTab()">SKILLS</span>
</div>
<div class="event-list" id="event-list">
  <div class="empty">No events yet</div>
</div>
<div class="event-list" id="skill-list" style="display:none">
  <div class="empty">No skill scans yet</div>
</div>

<div class="footer">
  <button class="footer-btn primary" onclick="openDashboard()">Open Dashboard</button>
  <button class="footer-btn" onclick="openSkillsTab()">Skills</button>
  <button class="footer-btn" onclick="clearData()">Clear</button>
</div>

<script>
let showingSkills = false;

function openDashboard() {
  chrome.tabs.create({ url: 'http://localhost:7070' });
  window.close();
}

function openSkillsTab() {
  chrome.tabs.create({ url: 'http://localhost:7070#skills' });
  window.close();
}

function showSkillsTab() {
  showingSkills = true;
  document.getElementById('event-list').style.display = 'none';
  document.getElementById('skill-list').style.display = 'block';
  document.getElementById('tab-toggle').textContent = 'EVENTS';
}

function toggleTab() {
  showingSkills = !showingSkills;
  document.getElementById('event-list').style.display = showingSkills ? 'none' : 'block';
  document.getElementById('skill-list').style.display = showingSkills ? 'block' : 'none';
  document.getElementById('tab-toggle').textContent = showingSkills ? 'EVENTS' : 'SKILLS';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function clearData() {
  await chrome.runtime.sendMessage({ type: 'CLEAR_LOG' });
  document.getElementById('s-blocked').textContent = '0';
  document.getElementById('s-flagged').textContent = '0';
  document.getElementById('s-clean').textContent   = '0';
  document.getElementById('event-list').innerHTML  = '<div class="empty">Cleared</div>';
}

async function loadSkillScans() {
  try {
    const res = await fetch('http://localhost:7070/api/skill-scans?limit=50');
    if (!res.ok) return;
    const data = await res.json();
    const scans = (data.scans || []).filter(s => s.action !== 'CLEAN').slice(0, 8);
    const allScans = data.scans || [];

    // Show alert banner if any blocked/flagged skill scans
    const notable = allScans.filter(s => s.action !== 'CLEAN');
    const blocked = notable.filter(s => s.action === 'BLOCKED').length;
    const alert = document.getElementById('skill-alert');
    const alertText = document.getElementById('skill-alert-text');
    if (notable.length > 0) {
      alert.style.display = 'block';
      alertText.textContent = blocked > 0
        ? `${blocked} skill${blocked>1?'s':''} blocked — supply chain risk`
        : `${notable.length} skill${notable.length>1?'s':''} flagged for review`;
    }

    // Populate skills list
    const list = document.getElementById('skill-list');
    if (!scans.length) {
      list.innerHTML = '<div class="empty">No skill findings</div>';
      return;
    }
    list.innerHTML = scans.map(s => {
      const ts = new Date(s.timestamp).toLocaleTimeString('en-US', {hour12:false,hour:'2-digit',minute:'2-digit'});
      const filename = esc(s.file_path.split('/').pop());
      const topFinding = s.findings?.[0]?.type || '';
      const detail = topFinding ? `${esc(s.skill_type)} — ${esc(topFinding)}` : esc(s.skill_type);
      return `<div class="event-item">
        <span class="badge ${esc(s.action)}">${esc(s.action)}</span>
        <span class="event-detail" title="${esc(s.file_path)}">${filename} ${detail}</span>
        <span style="color:var(--muted);font-size:10px;white-space:nowrap">${ts}</span>
      </div>`;
    }).join('');
  } catch(e) {
    // Server not available — silently skip skill data
  }
}

async function load() {
  chrome.runtime.sendMessage({ type: 'GET_STATUS' }, resp => {
    if (!resp) return;

    const pill    = document.getElementById('status-pill');
    const text    = document.getElementById('status-text');
    const banner  = document.getElementById('partial-banner');
    const { claudeSessionActive, proxyActive, sessionStats: s } = resp;

    if (claudeSessionActive && proxyActive) {
      pill.className = 'pill full';
      text.textContent = 'FULL PROTECTION';
      banner.style.display = 'none';
    } else if (claudeSessionActive && !proxyActive) {
      pill.className = 'pill partial';
      text.textContent = 'PARTIAL PROTECTION';
      banner.style.display = 'block';
    } else if (!claudeSessionActive) {
      pill.className = 'pill inactive';
      text.textContent = 'NO CLAUDE SESSION';
      banner.style.display = 'none';
    } else {
      pill.className = 'pill unknown';
      text.textContent = 'CHECKING';
    }

    document.getElementById('s-blocked').textContent = s?.blocked ?? '0';
    document.getElementById('s-flagged').textContent = s?.flagged ?? '0';
    document.getElementById('s-clean').textContent   = s?.clean   ?? '0';
  });

  chrome.storage.local.get(['auditLog'], result => {
    const log  = result.auditLog || [];
    const list = document.getElementById('event-list');
    if (!log.length) { list.innerHTML = '<div class="empty">No events yet</div>'; return; }
    list.innerHTML = log.slice(0, 8).map(e => {
      const action = e.action || 'UNKNOWN';
      const ts     = new Date(e.timestamp).toLocaleTimeString('en-US', {hour12:false,hour:'2-digit',minute:'2-digit'});
      const detail = e.type === 'DOMAIN_WARNING'
        ? `Domain: ${e.domain || '–'}`
        : (e.findings?.length ? e.findings.map(f=>f.type).join(', ') : 'Clean');
      return `<div class="event-item">
        <span class="badge ${action}">${action}</span>
        <span class="event-detail">${detail}</span>
        <span style="color:var(--muted);font-size:10px;white-space:nowrap">${ts}</span>
      </div>`;
    }).join('');
  });

  // Load skill scan data from local server
  await loadSkillScans();
}

load();
</script>
</body>
</html>
